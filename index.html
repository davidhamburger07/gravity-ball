<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Gravity Ball</title>
    <link rel="icon" href="data:," /><!-- suppress favicon 404 in dev -->
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        touch-action: none; overscroll-behavior: none;
        background: #0d1018;
        background: radial-gradient(130% 90% at 50% 30%, #171d31 0%, #0d1018 72%);
      }
      /* 100dvh tracks the *visible* viewport on mobile (accounts for the address bar), so the
         playfield stays truly centered when the toolbar shows/hides. Phaser's CENTER_BOTH does the
         centering — no flexbox here, or the two compound and push the canvas off-center. */
      #game-root { width: 100vw; height: 100vh; height: 100dvh; }
      canvas { display: block; }

      #loading {
        position: fixed; inset: 0; z-index: 50;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      }
      #loading .spinner {
        width: 42px; height: 42px; border-radius: 50%;
        border: 4px solid #2a3050; border-top-color: #38e1ff;
        animation: gb-spin .9s linear infinite;
      }
      #loading .label { color: #7a80a8; font-size: 13px; letter-spacing: .15em; text-transform: uppercase; }
      @keyframes gb-spin { to { transform: rotate(360deg); } }
    </style>

    <!-- Physics/render engine (CDN for zero-build local dev; bundle for production, see README). -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- CrazyGames SDK v3. Fails gracefully off-platform; our wrapper falls back to a local mock. -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="loading"><div class="spinner"></div><div class="label">Loading</div></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
