<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gravity Ball — Level Editor</title>
    <link rel="icon" href="data:," />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0d1020; font-family: system-ui, sans-serif; }
      #editor-root { display: flex; height: 100vh; }
      #editor-stage { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }
      #editor-stage canvas { display: block; }

      #editor-panel { width: 306px; flex: none; background: #161a2b; color: #c9cde8;
        padding: 16px; overflow-y: auto; border-left: 1px solid #232840; }
      #editor-panel h1 { margin: 0 0 12px; font-size: 18px; color: #38e1ff; }
      .section { margin-bottom: 14px; padding-top: 12px; border-top: 1px solid #232840; }
      .section:first-of-type { border-top: none; padding-top: 0; }
      .section-title { display: block; margin-bottom: 8px; font-size: 11px; letter-spacing: .08em;
        text-transform: uppercase; color: #7a80a8; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
      .field label { font-size: 11px; color: #9aa0c3; }
      .field-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        font-size: 12px; color: #c9cde8; cursor: pointer; }
      .field-row input[type="checkbox"] { width: auto; margin: 0; accent-color: #38e1ff; }

      button { padding: 8px 6px; background: #2a2f45; color: #dfe3f5; border: none; border-radius: 6px;
        cursor: pointer; font-size: 13px; }
      button:hover { background: #343a57; }
      button.active { background: #38e1ff; color: #0b1020; font-weight: 600; }
      button.primary { background: #2bd67b; color: #07130c; font-weight: 700; }
      button.primary:hover { background: #48e08e; }

      input, select, textarea { width: 100%; background: #0d1020; color: #dfe3f5;
        border: 1px solid #2a3050; border-radius: 5px; padding: 6px; font-size: 13px; }
      textarea { font-family: ui-monospace, monospace; resize: vertical; }
      .status { height: 16px; margin-top: 6px; font-size: 12px; color: #2bd67b; }
      .help { font-size: 11px; color: #6a708f; line-height: 1.5; }
      a.back { display: inline-block; margin-top: 6px; color: #38e1ff; text-decoration: none; font-size: 13px; }
      a.back:hover { text-decoration: underline; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="editor-root">
      <div id="editor-stage"></div>
      <div id="editor-panel"></div>
    </div>
    <script type="module" src="/src/editor/main.js"></script>
  </body>
</html>
